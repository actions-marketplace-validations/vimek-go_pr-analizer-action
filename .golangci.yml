version: "2"
run:
  go: "1.26"
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoinits
    - goconst
    - gocyclo
    - goheader
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - makezero
    - misspell
    - nakedret
    - nestif
    - nolintlint
    - predeclared
    - revive
    - staticcheck
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/vimek-go/pr-analizer-action/config
            - github.com/vimek-go/pr-analizer-action/event
            - github.com/vimek-go/pr-analizer-action/gh
            - github.com/vimek-go/pr-analizer-action/service
            - github.com/vimek-go/pr-analizer-action/models
            - github.com/google/go-github/v50/github
            - golang.org/x/oauth2
            - github.com/pkg/errors
            - gopkg.in/yaml.v3
            - github.com/vimek-go/pr-analizer-action/output
            - github.com/vimek-go/pr-analizer-action/counter
            - github.com/vimek-go/pr-analizer-action/enum
            - github.com/vimek-go/pr-analizer-action/rules
            - github.com/stretchr/testify/assert
            - github.com/stretchr/testify/require
            - github.com/stretchr/testify/mock
    dupl:
      threshold: 160
    errcheck:
      check-blank: true
    errorlint:
      errorf: false
    funlen:
      lines: 104
      statements: 60
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - funlen
          - goconst
        path: (.+)_test.go
      - linters:
          - lll
        source: '^//go:generate '
      - path: (.+)\.go$
        text: Using the variable on range scope `tt` in function literal
    paths:
      - vendor
      - bin
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - vendor
      - bin
      - third_party$
      - builtin$
      - examples$
